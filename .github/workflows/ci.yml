name: CI

# 検証網（第1部）。安い網から順に当てる: ruff → mypy → pytest。
# GitHub へ公開すると、push と PR で自動実行される。

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 検証網ツールを導入
        run: python -m pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: 型チェック (mypy)
        run: mypy app experiments
      - name: テスト (pytest)
        run: pytest -q
